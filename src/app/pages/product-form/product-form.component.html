<div>
  <div>
    <mat-toolbar color="primary">
      <mat-toolbar-row>
        <span class="toolbar-spacer"></span>
        <button (click)="back()" color="primary" mat-button style="color: white">
          <mat-icon>arrow_back_ios</mat-icon>
          {{ 'main.button_back' | translate }}
        </button>
      </mat-toolbar-row>
    </mat-toolbar>
  </div>
  
  <div class="app-form" style="padding: 24px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px;">
    <form (ngSubmit)="save(objForm.value)" [formGroup]="objForm">
      
      <mat-form-field style="width: 100%;">
        <mat-label>Produktname</mat-label>
        <input #inputName appAutofocus formControlName="name" matInput maxlength="50" required placeholder="z.B. Gaming Monitor">
        <mat-hint align="end">{{inputName.value.length || 0}}/50</mat-hint>
      </mat-form-field>

      <mat-form-field style="width: 100%;">
        <mat-label>Preis (CHF)</mat-label>
        <input formControlName="price" matInput type="number" step="0.05" required placeholder="0.00">
      </mat-form-field>

      <mat-form-field style="width: 100%;">
        <mat-label>Lagerbestand (Anzahl)</mat-label>
        <input formControlName="stock" matInput type="number" step="1" required placeholder="0">
      </mat-form-field>

      <mat-form-field style="width: 100%;">
        <mat-label>Kategorie auswählen</mat-label>
        <mat-select formControlName="categoryId" required>
          <mat-option *ngFor="let cat of categories" [value]="cat.id">
            {{ cat.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <div style="margin-top: 16px;">
        <button [disabled]="!objForm.valid" color="primary" mat-raised-button style="width: 200px">
          {{ 'main.button_save' | translate }}
        </button>
      </div>

    </form>
  </div>
</div>
