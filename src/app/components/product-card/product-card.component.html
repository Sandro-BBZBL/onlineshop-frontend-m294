<mat-card class="product-card" style="background: #2a2a2a; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.3); height: 100%; display: flex; flex-direction: column;">
  
  <img mat-card-image [src]="'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500&q=80'" [alt]="product.name" style="width: 100%; max-height: 300px; object-fit: cover;">
  
  <mat-card-header style="padding: 16px 16px 0 16px;">
    <mat-card-title style="font-size: 1.5rem; color: #ff4081;">{{ product.name }}</mat-card-title>
    <mat-card-subtitle style="color: #bbb; margin-top: 4px;">
      Kategorie: <strong style="color: white;">{{ product.category?.name || 'Allgemein' }}</strong>
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content style="padding: 16px; flex-grow: 1;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
      <span style="font-size: 1.4rem; font-weight: bold; color: #4caf50;">CHF {{ product.preis }}</span>
      
      @if ((product.bestand || 0) > 0) {
        <mat-chip style="background-color: #2e7d32; color: white; font-weight: bold;">
          Auf Lager ({{ product.bestand }})
        </mat-chip>
      } @else {
        <mat-chip style="background-color: #c62828; color: white;" disabled>
          Ausverkauft
        </mat-chip>
      }
    </div>

    <div style="margin-top: 20px;">
      <ng-content></ng-content>
    </div>
  </mat-card-content>
</mat-card>
