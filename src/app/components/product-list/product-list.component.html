<div style="display: flex; flex-direction: column; gap: 12px;">
  <div *ngIf="products.length === 0" style="color: #bbb; text-align: center; padding: 16px;">
    Keine Produkte vorhanden.
  </div>

  <div *ngFor="let prod of products" 
       style="display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 12px 16px; border-radius: 6px; border-left: 4px solid #3f51b5;">
    <div>
      <strong style="color: #fff; font-size: 1.1em;">{{ prod.name }}</strong>
      <div style="color: #aaa; font-size: 0.9em; margin-top: 4px;">
        Preis: {{ prod.preis | currency:'CHF' }} | Lagerbestand: {{ prod.bestand }} Stk.
      </div>
    </div>

    <div style="display: flex; gap: 8px;">
      <button mat-raised-button color="primary" (click)="editProduct(prod.id)">
        <mat-icon>edit</mat-icon> Bearbeiten
      </button>
      
      <button mat-raised-button color="warn" (click)="deleteProduct(prod.id)">
        <mat-icon>delete</mat-icon> Löschen
      </button>
    </div>
  </div>
</div>
