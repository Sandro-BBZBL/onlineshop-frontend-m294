<div *ngIf="lowStockProducts.length > 0" 
     style="background: #7a1c1c; border: 1px solid #f44336; border-radius: 8px; padding: 16px; color: #fff; margin-bottom: 24px;">
  <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-weight: bold;">
    <mat-icon style="color: #f44336;">warning</mat-icon>
    <span>{{ 'admin.dashboard.low_stock_warning' | translate }}</span>
  </div>
  <ul style="margin: 0; padding-left: 20px;">
    <li *ngFor="let item of lowStockProducts" style="margin-bottom: 4px;">
      {{ item.name }} ({{ 'admin.dashboard.remaining' | translate }}: {{ item.bestand }} Stk.)
    </li>
  </ul>
</div>
