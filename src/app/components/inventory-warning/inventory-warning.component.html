<div style="padding: 16px; background-color: rgba(244, 67, 54, 0.1); border-left: 4px solid #f44336; border-radius: 4px; margin-bottom: 20px;">
  <h3 style="color: #f44336; margin-top: 0;">Lagerbestand Warnung</h3>
  
  @if (lowStockProducts.length === 0) {
    <p style="color: #ddd;">Aktuell sind alle Produkte ausreichend auf Lager.</p>
  } @else {
    <p style="color: #ddd;">Einige Produkte müssen nachbestellt werden!</p>
  }
</div>
